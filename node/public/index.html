<!DOCTYPE html>
<html lang="id">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <meta name="description" content="Alat untuk enkripsi teks menggunakan Caesar Cipher">
        <title>Caesar Cipher</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <main class="container">
            <h1 class="title">Caesar Cipher</h1>
            <form class="cipher" id="cipher">
                <input class="input" name="plaintext" placeholder="Teks">
                <input class="input" name="shift" type="number" placeholder="Pergeseran">
                <button class="button" id="submit">Enkripsi</button>
            </form>
            <p id="output">Hasil: &quot;&quot;</p>
        </main>
        <!--<script src="https://cdn.jsdelivr.net/npm/eruda"></script>
        <script>eruda.init();</script>-->
        <script src="main.js"></script>
    </body>
</html>
